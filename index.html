<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão Neumórfico - CodingNepal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <div class="card neu-raised">
            
            <div class="card-header">
                <button class="btn-icon neu-pressed" title="Voltar">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="btn-icon neu-pressed" title="Opções">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>

            <div class="profile-pic-container neu-pressed">
                <img src="imagem/jovem.jpg" alt="Foto de CodingNepal" class="profile-pic">
            </div>

            <div class="profile-info">
                <h2 class="name">CodingNepal</h2>
                <p class="title">Designer & Developer</p>
            </div>

            <div class="social-icons">
                <button class="btn-social neu-pressed fb" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="btn-social neu-pressed tw" title="Twitter">
                    <i class="fab fa-twitter"></i>
                </button>
                <button class="btn-social neu-pressed inst" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </button>
                <button class="btn-social neu-pressed yt" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </button>
            </div>

            <div class="action-buttons">
                <button class="btn-action neu-raised" id="btnMessage">Message</button>
                <button class="btn-action neu-raised" id="btnSubscribe">Subscribe</button>
            </div>

            <div class="stats-footer neu-raised">
                <div class="stat-item">
                    <i class="far fa-heart"></i>
                    <span class="stat-value">20.4k</span>
                </div>
                <div class="stat-divider">|</div>
                <div class="stat-item">
                    <i class="far fa-comment"></i>
                    <span class="stat-value">14.3k</span>
                </div>
                <div class="stat-divider">|</div>
                <div class="stat-item">
                    <i class="fas fa-share"></i>
                    <span class="stat-value">12.8k</span>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
